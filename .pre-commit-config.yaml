default_stages: [pre-commit]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.3
    hooks:
      - id: ruff
        name: ruff check and fix
        args: [
          '--fix',
          '--config', 'pyproject.toml',
          '--exit-non-zero-on-fix'
        ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash ./run-mypy
        language: system
        types: [python]
        pass_filenames: false
