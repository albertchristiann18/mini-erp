version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mini-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_erp # <- use underscore, not hyphen
    ports:
      - "5433:5432" # host:container; change to 5432:5432 if you prefer
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mini_erp" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
