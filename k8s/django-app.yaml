apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app-deployment
  labels:
    app: django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django-app
        image: mini-erp-uv:v1 # Local image built by local_deploy.sh
        imagePullPolicy: Never # Crucial: forces K8s to use the local image
        ports:
        - containerPort: 8000
        env:
          # --- SECRET CREDENTIALS ---
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: SECRET_KEY
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: POSTGRES_PASSWORD
              
          # --- KUBERNETES NETWORK OVERRIDES ---
        - name: DB_HOST
          value: postgres-service     # Overrides DB_HOST=localhost/db
        - name: DB_PORT
          value: "5432"               # Overrides DB_PORT=5433
          
          # --- NON-SECRET CONFIGURATION ---
        - name: DB_NAME
          value: mini_erp

        - name: ALLOWED_HOSTS
          value: "*"
        - name: DJANGO_SUPERUSER_USERNAME
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: DJANGO_SUPERUSER_USERNAME
        - name: DJANGO_SUPERUSER_EMAIL
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: DJANGO_SUPERUSER_EMAIL
        - name: DJANGO_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: DJANGO_SUPERUSER_PASSWORD
        - name: DEBUG
          valueFrom:
            secretKeyRef:
              name: mini-erp-db-secret
              key: DEBUG
---
# Service to expose the Django app EXTERNALLY via NodePort
apiVersion: v1
kind: Service
metadata:
  name: django-app-service
spec:
  type: NodePort 
  selector:
    app: django
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000