services:
  # The Database
  db_test:
    image: postgres:15
    environment:
      - POSTGRES_DB=db_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Test Runner
  test:
    build:
      context: .
      # MAGIC PART: This tells Docker to use Stage 1 (Builder)
      target: builder
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - SECRET_KEY=dev-change-me
      - DEBUG=True
      - ALLOWED_HOSTS=127.0.0.1,localhost
      - ENV=local
      - DB_NAME=inventory_test_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db_test
      - DB_PORT=5432
    # We override the entrypoint to install dev dependencies and run pytest
    # 'uv sync' (without --no-dev) will pull in pytest quickly
    entrypoint: [] 
    command: >
      sh -c "uv sync &&
             uv run pytest"
    depends_on:
      db_test:
        condition: service_healthy