name: Code Quality Check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      
      - name: "Install Dependencies"
        run: |
          uv sync
          
      # Ruff: import order + lints (no autofix in CI)
      - name: Ruff check (imports)
        run: uv run ruff check . --select I --diff --config pyproject.toml

      - name: Ruff formatting (check-only)
        run: uv run ruff format . --check

      # Mypy type check
      - name: Mypy
        run: uv run mypy . --config-file mypy.ini

